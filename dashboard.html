<!DOCTYPE html>
<html lang="en">    
<head>  
    <meta charset="UTF-8">
    <title>FinTrack Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
<div class="container mt-4">

    <header class="mb-4">
        <h2>Dashboard</h2>
    </header>

    <div class="row">
        <div class="col-md-4">
            <div class="card p-3 shadow border-0" style="border-left: 5px solid var(--border) !important;">
                <h6 class="text-muted">Total Balance</h6>
                <h3>RM 670</h3>
            </div>
        </div>
        
        <div class="col-md-4">
            <div class="card p-3 shadow border-0" style="border-left: 5px solid var(--safe) !important;">
                <h6 class="text-muted">Total Income</h6>
                <h3 style="color: var(--safe);">RM 1,200</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow border-0" style="border-left: 5px solid var(--danger) !important;">
                <h6 class="text-muted">Total Expenses</h6>
                <h3 style="color: var(--danger);">RM 530</h3>
            </div>
        </div>
    </div>

    <div class="card p-3 mt-4">
        <h5>Spending Overview</h5>

        <div style="height:300px; background:#f5f5f5;">
            Chart
        </div>
    </div>
    
    <div class="card p-3 mt-4">
        <h5>Recent Transactions</h5>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>2026-01-01</td>
                    <td>Grocery Shopping</td>
                    <td>RM 150</td>
                </tr>
                <tr>
                    <td>2026-01-01</td>
                    <td>Salary</td>
                    <td>RM 1,200</td>
                </tr>
                <tr>
                    <td>2026-01-01</td>
                    <td>Electricity Bill</td>
                    <td>RM 80</td>
                </tr>
            </tbody>
        </table>
</div>
</div>
</body>

</html>
